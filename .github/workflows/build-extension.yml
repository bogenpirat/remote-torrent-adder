name: Build Chrome Extension

on:
  push:
    branches:
      - '**'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Type check (Vite targets)
        run: npx tsc --noEmit
      - name: Type check (Rollup targets)
        run: npx tsc --noEmit -p tsconfig.rollup.json

  build-dev:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build extension
        run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: chrome-extension-dist
          path: dist

  build-prod:
    if: github.ref == 'refs/heads/master'
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build extension (production)
        run: npm run build:prod
      - name: Upload production build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: chrome-extension-dist-prod
          path: dist-prod
